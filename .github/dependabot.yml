version: 2
updates:
  # 追蹤 GitHub Actions 版本更新（緩解第三方 action 釘在浮動 major tag 的供應鏈風險）
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  # Flutter/Dart 套件（只收非 major：major 升級常含破壞性 API 變更，手動處理）
  - package-ecosystem: pub
    directory: /app_flutter
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
